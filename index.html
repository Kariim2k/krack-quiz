<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krack Quiz App</title>
    <link rel="icon" type="image/png" href="/krack-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/krack-icon.png" />
  </head>

  <body>
    <div id="authPage">
      <h1>Krack Quiz</h1>

      <div class="auth-box">
        <input id="username" type="text" placeholder="Username" />

        <div class="password-container">
          <input id="password" type="password" placeholder="Password" />

          <button id="showPasswordBtn" type="button">👁</button>
        </div>

        <p id="authError"></p>

        <button id="signupBtn">Sign Up</button>

        <button id="loginBtn">Login</button>
      </div>
    </div>

    <div id="quizPage">
      <div class="container">
        <h1>Krack Quiz</h1>

        <div class="progress-container">
          <div id="progressBar"></div>
        </div>

        <div class="stats">
          <div class="stat-box">
            <span>📋</span>
            <p id="progress"></p>
          </div>

          <div class="stat-box">
            <span>⏱</span>
            <p><span id="timer">10</span>s</p>
          </div>

          <div class="stat-box">
            <span>🏆</span>
            <p><span id="score">0</span></p>
          </div>
        </div>

        <h2 id="question"></h2>

        <div id="options"></div>

        <div class="footer">
          <button id="nextBtn">Next</button>
        </div>

        <button id="restartBtn">Restart</button>

        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
